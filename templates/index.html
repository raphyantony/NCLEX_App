<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCLEX First Instinct</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f7f6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .tag { display: inline-block; background: #e2e8f0; padding: 5px 10px; border-radius: 15px; font-size: 12px; font-weight: bold; margin-bottom: 15px; color: #4a5568; }
        h2 { font-size: 18px; line-height: 1.5; margin-top: 0; }
        input[type="text"] { width: 100%; padding: 12px; margin: 15px 0; border: 2px solid #cbd5e0; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { background: #4299e1; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; }
        button:hover { background: #3182ce; }
        .coach-box { background: #ebf8ff; border-left: 4px solid #4299e1; padding: 15px; margin: 20px 0; border-radius: 4px; display: none; }
        .options-box, .rationale-box { display: none; margin-top: 20px; }
        .rationale-box { background: #f0fff4; padding: 15px; border-radius: 8px; border: 1px solid #9ae6b4; }
        .trap-box { background: #fff5f5; padding: 15px; border-radius: 8px; border: 1px solid #feb2b2; margin-top: 10px; color: #c53030;}
    </style>
</head>
<body>

    <div class="card">
        <div class="tag" id="q-type">Loading...</div>
        <h2 id="q-stem">Getting your next question...</h2>
        
        <div id="instinct-section">
            <p><strong>Lock Your First Instinct:</strong><br>The nurse's most important priority right now is...</p>
            <input type="text" id="instinct-input" placeholder="Type your gut answer here...">
            <button onclick="lockInstinct()" id="lock-btn">Lock Instinct & Reveal Options</button>
        </div>

        <div class="coach-box" id="coach-box">
            <strong>✨ AI Coach Says:</strong>
            <p id="coach-text">Thinking...</p>
        </div>

        <div class="options-box" id="options-box">
            <p><em>(Options revealed! Discuss with yourself, then click below to see the answer).</em></p>
            <button onclick="showAnswer()" style="background: #48bb78;">Reveal Correct Answer</button>
        </div>

        <div class="rationale-box" id="rationale-box">
            <h3 style="margin-top:0; color: #2f855a;">Correct Answer: <span id="correct-letter"></span></h3>
            <p id="rationale-text"></p>
            <div class="trap-box">
                <strong>⚠️ The NCLEX Trap:</strong>
                <p id="trap-text"></p>
            </div>
            <button onclick="loadQuestion()" style="margin-top: 15px; background: #a0aec0;">Next Question</button>
        </div>
    </div>

    <script>
        let currentQuestion = {};

        async function loadQuestion() {
            // Reset UI
            document.getElementById('instinct-section').style.display = 'block';
            document.getElementById('instinct-input').value = '';
            document.getElementById('coach-box').style.display = 'none';
            document.getElementById('options-box').style.display = 'none';
            document.getElementById('rationale-box').style.display = 'none';
            document.getElementById('lock-btn').innerText = 'Lock Instinct & Reveal Options';
            document.getElementById('lock-btn').disabled = false;

            // Fetch question
            const res = await fetch('/api/question');
            currentQuestion = await res.json();
            
            document.getElementById('q-type').innerText = currentQuestion.type.toUpperCase();
            document.getElementById('q-stem').innerText = currentQuestion.stem;
        }

        async function lockInstinct() {
            const instinct = document.getElementById('instinct-input').value;
            if (!instinct) return alert("Type your instinct first!");

            document.getElementById('lock-btn').innerText = 'Asking AI Coach...';
            document.getElementById('lock-btn').disabled = true;

            // Call Gemini AI
            const res = await fetch('/api/coach', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ instinct: instinct, rationale: currentQuestion.rationale })
            });
            const data = await res.json();

            // Show UI
            document.getElementById('instinct-section').style.display = 'none';
            document.getElementById('coach-text').innerText = data.note;
            document.getElementById('coach-box').style.display = 'block';
            document.getElementById('options-box').style.display = 'block';
        }

        function showAnswer() {
            document.getElementById('options-box').style.display = 'none';
            
            // Handle Bowtie vs Standard formatting for the answer display
            let answerText = typeof currentQuestion.correct === 'object' ? 
                JSON.stringify(currentQuestion.correct) : currentQuestion.correct;
                
            document.getElementById('correct-letter').innerText = answerText;
            document.getElementById('rationale-text').innerText = currentQuestion.rationale;
            document.getElementById('trap-text').innerText = currentQuestion.trap;
            document.getElementById('rationale-box').style.display = 'block';
        }

        // Load first question on start
        loadQuestion();
    </script>
</body>
</html>
